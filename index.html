<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>电子书资料库</title>
  <style>
    :root {
      --bg: #151715;
      --panel: #20231f;
      --panel-soft: #262b25;
      --text: #f4f2ec;
      --muted: #aeb7ac;
      --line: #3a4038;
      --accent: #1f8a70;
      --accent-strong: #27a886;
      --gold: #d8a74b;
      --danger: #f0c36d;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    a {
      color: inherit;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(21, 23, 21, 0.92);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
    }

    .bar,
    main,
    footer {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
    }

    .bar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    main {
      flex: 1;
      padding: 46px 0 42px;
    }

    .hero {
      padding: 26px 0 20px;
    }

    .hero h1 {
      margin: 0 0 20px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.08;
      font-weight: 850;
      letter-spacing: 0;
    }

    .search-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      max-width: 820px;
      margin-bottom: 16px;
    }

    .search-wrap input {
      width: 100%;
      height: 56px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1110;
      color: var(--text);
      font: inherit;
      font-size: 18px;
      outline: none;
      padding: 0 16px;
    }

    .search-wrap input:focus {
      border-color: var(--accent-strong);
      box-shadow: 0 0 0 4px rgba(39, 168, 134, 0.14);
    }

    .search-wrap button,
    .open-link,
    .copy {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: var(--accent);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      white-space: nowrap;
    }

    .search-wrap button {
      height: 56px;
    }

    .search-wrap button:hover,
    .open-link:hover {
      background: var(--accent-strong);
    }

    .copy {
      background: #343a34;
      color: var(--text);
    }

    .disclaimer {
      max-width: 940px;
      border: 1px solid rgba(216, 167, 75, 0.42);
      border-radius: 8px;
      background: rgba(216, 167, 75, 0.08);
      color: #f4dfb6;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.75;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 18px;
      align-items: start;
      margin-top: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel-note {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .ranking {
      list-style: none;
      margin: 0;
      padding: 8px;
    }

    .rank-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      padding: 10px;
      border-radius: 7px;
      color: var(--text);
      text-decoration: none;
    }

    .rank-item:hover {
      background: var(--panel-soft);
    }

    .rank-num {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #2f372f;
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
    }

    .rank-title {
      display: block;
      font-weight: 700;
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .rank-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      color: var(--muted);
      min-height: 22px;
      font-size: 14px;
    }

    .results {
      padding: 0;
    }

    .result-list {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .result {
      background: var(--panel);
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .result h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .result-meta {
      color: var(--muted);
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.5;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .empty,
    .error {
      padding: 28px 18px;
      color: var(--muted);
      background: var(--panel);
    }

    .error {
      color: var(--danger);
    }

    footer {
      padding: 0 0 26px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      .bar {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        padding: 14px 0;
      }

      main {
        padding-top: 26px;
      }

      .search-wrap,
      .layout,
      .result {
        grid-template-columns: 1fr;
      }

      .search-wrap button,
      .open-link,
      .copy {
        width: 100%;
      }

      .result-actions {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="bar">
        <p class="brand">电子书资料库</p>
        <div class="count" id="count">正在加载</div>
      </div>
    </header>

    <main>
      <section class="hero" aria-label="搜索">
        <h1>搜索你要找的电子书</h1>
        <form class="search-wrap" id="searchForm">
          <input id="search" type="search" placeholder="输入书名、作者或关键词" autocomplete="off">
          <button type="submit">搜索</button>
        </form>
        <div class="disclaimer">
          免责声明：本站仅整理第三方网盘分享链接，不存储、不上传、不分发电子书文件。所有资源版权归原作者及出版社所有，请支持正版阅读。如相关权利人认为链接侵犯权益，请联系站点维护者核实后删除。
        </div>
      </section>

      <section class="layout">
        <section class="panel" aria-label="热度排行">
          <div class="panel-head">
            <h2>热度排行</h2>
            <span class="panel-note">Top 12</span>
          </div>
          <ol class="ranking" id="ranking"></ol>
        </section>

        <section class="panel results" aria-label="搜索结果">
          <div class="panel-head">
            <h2>搜索结果</h2>
            <span class="status" id="status">输入关键词后显示结果</span>
          </div>
          <div class="result-list" id="results"></div>
        </section>
      </section>
    </main>

    <footer>
      本站不提供版权规避、破解或文件托管服务。公开发布前请确认链接内容为公版、已获授权或你拥有合法分享权的资源。
    </footer>
  </div>

  <script>
    const HOT_API_BASE = "https://ningyan1228-ebook-library.netlify.app/api";
    const BAIDU_TONGJI_ID = "";

    const state = {
      books: [],
      query: "",
      hotCounts: new Map()
    };

    const els = {
      count: document.querySelector("#count"),
      form: document.querySelector("#searchForm"),
      search: document.querySelector("#search"),
      ranking: document.querySelector("#ranking"),
      status: document.querySelector("#status"),
      results: document.querySelector("#results")
    };

    const normalize = (value) => String(value || "").trim().toLowerCase();

    function searchableText(book) {
      return normalize([
        book.title,
        (book.authors || []).join(" "),
        book.publisher,
        book.category,
        (book.tags || []).join(" "),
        book.format,
        book.description
      ].join(" "));
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function getMeta(book) {
      return [
        (book.authors || []).join(" / "),
        book.format,
        book.cloudProvider,
        book.sharedAt
      ].filter(Boolean).join(" · ");
    }

    function getHotCount(book) {
      return state.hotCounts.get(book.id) || Number(book.hotScore || 0);
    }

    function getBookById(id) {
      return state.books.find((book) => book.id === id);
    }

    function loadBaiduTongji() {
      if (!BAIDU_TONGJI_ID) return;

      window._hmt = window._hmt || [];
      const script = document.createElement("script");
      script.async = true;
      script.src = `https://hm.baidu.com/hm.js?${encodeURIComponent(BAIDU_TONGJI_ID)}`;
      document.head.appendChild(script);
    }

    async function loadHotRanking() {
      if (!HOT_API_BASE) return null;

      try {
        const response = await fetch(`${HOT_API_BASE.replace(/\/$/, "")}/rank?limit=12`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const ranking = Array.isArray(data.ranking) ? data.ranking : [];

        state.hotCounts = new Map(ranking.map((item) => [item.id, Number(item.clicks || 0)]));
        return ranking.map((item) => getBookById(item.id)).filter(Boolean);
      } catch (error) {
        return null;
      }
    }

    async function trackClick(book) {
      if (window._hmt && book) {
        window._hmt.push(["_trackEvent", "book", "open", `${book.id} ${book.title}`]);
      }

      if (!HOT_API_BASE || !book || !book.id) return;

      const endpoint = `${HOT_API_BASE.replace(/\/$/, "")}/click`;
      const body = JSON.stringify({ id: book.id });

      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([body], { type: "application/json" });
          navigator.sendBeacon(endpoint, blob);
          return;
        }

        await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
          keepalive: true
        });
      } catch (error) {
        // The download link should never be blocked by analytics.
      }
    }

    function renderRanking(rankedBooks) {
      const rankedIds = new Set((rankedBooks || []).map((book) => book.id));
      const fallbackBooks = state.books
        .slice()
        .sort((a, b) => (getHotCount(b) - getHotCount(a)) || a.id.localeCompare(b.id))
        .filter((book) => !rankedIds.has(book.id));
      const ranked = [...(rankedBooks || []), ...fallbackBooks].slice(0, 12);

      els.ranking.innerHTML = ranked.map((book, index) => `
        <li>
          <a class="rank-item" href="${escapeHtml(book.url)}" target="_blank" rel="noopener noreferrer" data-book-id="${escapeHtml(book.id)}">
            <span class="rank-num">${index + 1}</span>
            <span>
              <span class="rank-title">${escapeHtml(book.title)}</span>
              <span class="rank-meta">${escapeHtml(getMeta(book))}${getHotCount(book) ? ` · ${getHotCount(book)} 次点击` : ""}</span>
            </span>
          </a>
        </li>
      `).join("");

      els.ranking.querySelectorAll("[data-book-id]").forEach((link) => {
        link.addEventListener("click", () => trackClick(getBookById(link.dataset.bookId)));
      });
    }

    function renderResult(book) {
      const copyButton = book.extractionCode
        ? `<button class="copy" type="button" data-code="${escapeHtml(book.extractionCode)}">复制提取码</button>`
        : "";

      return `
        <article class="result">
          <div>
            <h3>${escapeHtml(book.title)}</h3>
            <div class="result-meta">${escapeHtml(getMeta(book))}</div>
          </div>
          <div class="result-actions">
            ${copyButton}
            <a class="open-link" href="${escapeHtml(book.url)}" target="_blank" rel="noopener noreferrer" data-book-id="${escapeHtml(book.id)}">打开网盘</a>
          </div>
        </article>
      `;
    }

    function wireCopyButtons() {
      els.results.querySelectorAll(".copy").forEach((button) => {
        button.addEventListener("click", async () => {
          await navigator.clipboard.writeText(button.dataset.code);
          button.textContent = "已复制";
          setTimeout(() => {
            button.textContent = "复制提取码";
          }, 1200);
        });
      });

      els.results.querySelectorAll("[data-book-id]").forEach((link) => {
        link.addEventListener("click", () => trackClick(getBookById(link.dataset.bookId)));
      });
    }

    function renderResults() {
      const query = state.query;

      if (!query) {
        els.status.textContent = "输入关键词后显示结果";
        els.results.innerHTML = "";
        return;
      }

      const matched = state.books.filter((book) => searchableText(book).includes(query));
      const visible = matched.slice(0, 30);
      els.status.textContent = matched.length ? `找到 ${matched.length} 本，显示前 ${visible.length} 本` : "没有找到匹配结果";

      if (!matched.length) {
        els.results.innerHTML = `<div class="empty">换一个关键词试试。</div>`;
        return;
      }

      els.results.innerHTML = visible.map(renderResult).join("");
      wireCopyButtons();
    }

    async function loadBooks() {
      try {
        const response = await fetch("books.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.books = Array.isArray(data.books) ? data.books : [];
        els.count.textContent = `${state.books.length} 本已收录`;
        const rankedBooks = await loadHotRanking();
        renderRanking(rankedBooks);
        renderResults();
      } catch (error) {
        els.count.textContent = "加载失败";
        els.results.innerHTML = `<div class="error">无法读取 books.json。部署到网站空间后会正常加载；本地预览请用静态服务器打开。</div>`;
      }
    }

    els.search.addEventListener("input", (event) => {
      state.query = normalize(event.target.value);
      renderResults();
    });

    els.form.addEventListener("submit", (event) => {
      event.preventDefault();
      state.query = normalize(els.search.value);
      renderResults();
    });

    loadBaiduTongji();
    loadBooks();
  </script>
</body>
</html>
